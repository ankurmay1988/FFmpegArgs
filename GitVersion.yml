mode: ManualDeployment
tag-prefix: 'v'
branches:
  master:
    regex: ^master$
    increment: None
    label: ''
  main:
    regex: ^main$
    increment: None
    label: ''
  # Release branch: same scheme as master (Version = MAJOR.MINOR.<commits since vM.m.0>).
  # Overrides GitVersion's built-in GitFlow 'release' config so it does NOT add a 'beta' label.
  release:
    regex: ^release$
    increment: None
    label: ''
    source-branches: [ master, main, dev ]
